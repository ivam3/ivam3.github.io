name: Deploy Flet App to GitHub Pages

on:
  push:
    branches:
      - master # O 'main', asegúrate de cuál usas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet==0.24.1

      - name: Build Web App
        run: |
          # FLET_TEMPLATE_REF ayuda a evitar errores de versión en el build
          export FLET_TEMPLATE_REF=0.82.0
          flet build web --base-url /

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
